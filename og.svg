<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1726"/><stop offset="1" stop-color="#0b1320"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2738" stop-opacity=".5"/><stop offset="1" stop-color="#0b1320" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- ECG line -->
  <path d="M0 430 H360 l40 -150 l60 300 l46 -210 H700 l40 -120 l60 250 l44 -160 H1200"
        fill="none" stroke="#e11d2a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
  <!-- logo tile -->
  <rect x="90" y="86" width="74" height="74" rx="18" fill="#e11d2a"/>
  <path d="M104 124 h14 l6 -20 l10 38 l7 -18 h17" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="184" y="124" font-family="Archivo, Arial, sans-serif" font-weight="800" font-size="30" fill="#fff" letter-spacing="1">AXIOM</text>
  <text x="184" y="150" font-family="monospace" font-size="13" fill="#8b97a8" letter-spacing="6">PERFORMANCE PEPTIDES</text>
  <!-- headline -->
  <text x="90" y="320" font-family="Archivo, Arial, sans-serif" font-weight="900" font-size="92" fill="#ffffff" letter-spacing="-2">PERFORMANCE</text>
  <text x="90" y="412" font-family="Archivo, Arial, sans-serif" font-weight="900" font-size="92" letter-spacing="-2"><tspan fill="#e11d2a">PEPTIDE</tspan><tspan fill="#ffffff"> SCIENCE</tspan></text>
  <!-- subline -->
  <text x="92" y="468" font-family="Inter, Arial, sans-serif" font-size="25" fill="#aeb9c9">Clinical-grade research peptides · ≥98% purity · HPLC verified</text>
  <!-- badge -->
  <rect x="90" y="520" width="360" height="46" rx="23" fill="none" stroke="#ff6b74" stroke-opacity=".5"/>
  <text x="115" y="550" font-family="monospace" font-size="16" fill="#ff8a91" letter-spacing="3">✚ FOR RESEARCH USE ONLY</text>
</svg>
