<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DNA Helix — test</title>
<style>
html,body{margin:0;padding:0;background:#000;overflow-x:hidden}
#scene{position:fixed;inset:0;width:100vw;height:100vh}
#scroll-host{height:300vh}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.35);font:13px/1 sans-serif;pointer-events:none;letter-spacing:.06em}
</style>
<script type="importmap">
{
  "imports": {
    "three":          "https://unpkg.com/three@0.143.0/build/three.module.js",
    "three/addons/":  "https://unpkg.com/three@0.143.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="scene"></canvas>
<div id="scroll-host"></div>
<div class="hint">scroll ↓</div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer }       from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }           from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }      from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }           from 'three/addons/postprocessing/ShaderPass.js';
import { GammaCorrectionShader} from 'three/addons/shaders/GammaCorrectionShader.js';
import { CopyShader }           from 'three/addons/shaders/CopyShader.js';

/* ── Fixed parameters ─────────────────────────────────────────────────── */
const bgColor         = '#03142e';
const flameColor      = '#2bd6ff';
const flameColor2     = '#aef0ff';
const flameAmt        = 0.2;
const atmoColor       = '#7fe6ff';
const atmoCount       = 780;
const atmoSize        = 24;
const atmoSpeed       = 0.4;
const colorLow        = '#04123a';
const colorHigh       = '#27043e';
const opacity         = 2;
const pointSize       = 4;
const brightness      = 1.15;
const twist           = 0.65;
const waveAmt         = 0.7;
const dnaFloat        = 0.95;
const spin            = 0.18;
const scale           = 0.63;
const scrollClimb     = 9.5;
const scrollTwist     = 0.9;
const scrollDolly     = 0;
const scrollSpin      = 1.8;
const parallax        = 1;
const pointerRadius   = 2.2;
const pointerStrength = 0.2;

function hexToVec3(hex){
  const n=parseInt(hex.slice(1),16);
  return new THREE.Vector3(((n>>16)&255)/255,((n>>8)&255)/255,(n&255)/255);
}
const Lerp  = (a,b,t)=>a+(b-a)*t;
const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));

/* ── Renderer ─────────────────────────────────────────────────────────── */
const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGL1Renderer({ canvas, antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.VSMShadowMap;

/* ── Scene & camera ───────────────────────────────────────────────────── */
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.Fog(0x000000, 0, 15);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 400);
camera.position.set(0, 0, 8.67);

/* ── Layers ───────────────────────────────────────────────────────────── */
const LAYERS = { NONE:0, TORUS_SCENE:1, BLOOM_SCENE:2, ENTIRE_SCENE:3 };
camera.layers.enable(LAYERS.TORUS_SCENE);
camera.layers.enable(LAYERS.BLOOM_SCENE);
camera.layers.enable(LAYERS.ENTIRE_SCENE);

/* ── GLSL noise helpers ───────────────────────────────────────────────── */
const SNOISE = `
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+1.0*C.xxx;vec3 x2=x0-i2+2.0*C.xxx;vec3 x3=x0-1.0+3.0*C.xxx;
  i=mod(i,289.0);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.5-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float random(vec3 p){return fract(sin(dot(p,vec3(12.9898,78.233,45.164)))*43758.5453);}
`;

/* ── DNA helix geometry & material ───────────────────────────────────── */
const helixGeo = new THREE.SphereGeometry(4.2, 200, 600);

const helixMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
  uniforms: {
    uTime:          { value: 0 },
    uAppear:        { value: 0 },
    uColLow:        { value: hexToVec3(colorLow) },
    uColHigh:       { value: hexToVec3(colorHigh) },
    uOpacity:       { value: opacity },
    uSize:          { value: pointSize },
    uBrightness:    { value: brightness },
    uTwist:         { value: twist },
    uWaveAmt:       { value: waveAmt },
    uFloat:         { value: dnaFloat },
    uScale:         { value: scale },
    uCursor:        { value: new THREE.Vector3() },
    uRepelRadius:   { value: pointerRadius },
    uRepelStrength: { value: pointerStrength },
    uActivity:      { value: 0 },
  },
  vertexShader: `
    uniform float uTime;uniform float uSize;uniform float uTwist;uniform float uWaveAmt;
    uniform float uScale;uniform float uFloat;
    uniform vec3 uColLow;uniform vec3 uColHigh;
    uniform vec3 uCursor;uniform float uRepelRadius;uniform float uRepelStrength;uniform float uActivity;
    varying float vFade;varying vec3 vColor;
    ${SNOISE}
    void main(){
      float stretchedY=position.y*7.0-8.0;
      float rnd1=random(position);
      float rnd2=random(position+vec3(1.0));
      float rnd3=random(position+vec3(2.0));
      float t=stretchedY+sin(uTime*0.8+rnd1*6.28318)*uFloat;
      float tw=t*uTwist;
      float dnaRadius=1.0;
      float strandThickness=0.35;
      vec3 dnaPos;
      if(rnd1<0.40){
        vec3 core=vec3(dnaRadius*cos(tw),t,dnaRadius*sin(tw));
        vec3 offset=vec3(rnd1-0.2,rnd2-0.5,rnd3-0.5)*2.0*strandThickness;
        dnaPos=core+offset;
      } else if(rnd1<0.80){
        vec3 core=vec3(dnaRadius*cos(tw+3.14159),t,dnaRadius*sin(tw+3.14159));
        vec3 offset=vec3(rnd1-0.6,rnd2-0.5,rnd3-0.5)*2.0*strandThickness;
        dnaPos=core+offset;
      } else {
        float rungT=(rnd1-0.80)*5.0;
        float discreteT=floor(t*2.5)/2.5;
        float discreteTwist=discreteT*uTwist;
        vec3 p1=vec3(dnaRadius*cos(discreteTwist),discreteT,dnaRadius*sin(discreteTwist));
        vec3 p2=vec3(dnaRadius*cos(discreteTwist+3.14159),discreteT,dnaRadius*sin(discreteTwist+3.14159));
        vec3 core=mix(p1,p2,rungT);
        vec3 offset=vec3(rnd1-0.9,rnd2-0.5,rnd3-0.5)*2.0*0.10;
        dnaPos=core+offset;
      }
      dnaPos.x+=snoise(vec3(0.0,t*0.2,uTime*0.2))*uWaveAmt;
      dnaPos.z+=snoise(vec3(t*0.2,0.0,uTime*0.2))*uWaveAmt;
      vec3 finalPos=(dnaPos-vec3(0.0,-8.0,0.0))*uScale;
      vec4 modelPosition=modelMatrix*vec4(finalPos,1.0);
      vec3 toP=modelPosition.xyz-uCursor;
      float cd=length(toP);
      float fall=smoothstep(uRepelRadius,0.0,cd);
      modelPosition.xyz+=normalize(toP+vec3(0.0001))*fall*uRepelStrength*uActivity;
      vec4 mvPosition=viewMatrix*modelPosition;
      float colMix=smoothstep(-20.0,12.0,t);
      vColor=mix(uColLow,uColHigh,clamp(colMix,0.0,1.0));
      vFade=1.0;
      gl_PointSize=uSize*(10.0/-mvPosition.z);
      gl_PointSize=max(gl_PointSize,1.5);
      gl_Position=projectionMatrix*mvPosition;
    }
  `,
  fragmentShader: `
    uniform float uOpacity;uniform float uBrightness;uniform float uAppear;
    varying float vFade;varying vec3 vColor;
    void main(){
      vec2 xy=gl_PointCoord-0.5;
      float ll=length(xy);
      if(ll>0.5)discard;
      float a=smoothstep(0.5,0.1,ll);
      gl_FragColor=vec4(vColor*uBrightness,vFade*a*uOpacity*uAppear);
    }
  `,
});

const helixPoints  = new THREE.Points(helixGeo, helixMat);
helixPoints.frustumCulled = false;
helixPoints.layers.enable(LAYERS.ENTIRE_SCENE);

const group = new THREE.Group();
group.add(helixPoints);
scene.add(group);

/* ── Ambient motes ────────────────────────────────────────────────────── */
const atmoGeo  = new THREE.BufferGeometry();
const aPos     = new Float32Array(atmoCount * 3);
const aSz      = new Float32Array(atmoCount);
const aSeed    = new Float32Array(atmoCount);
for(let i=0;i<atmoCount;i++){
  aPos[i*3]   = Math.random()*2-1;
  aPos[i*3+1] = Math.random()*2-1;
  aPos[i*3+2] = Math.random()*2-1;
  aSz[i]      = atmoSize*(0.4+Math.random());
  aSeed[i]    = Math.random();
}
atmoGeo.setAttribute('position', new THREE.BufferAttribute(aPos,  3));
atmoGeo.setAttribute('size',     new THREE.BufferAttribute(aSz,   1));
atmoGeo.setAttribute('seed',     new THREE.BufferAttribute(aSeed, 1));

const atmoMat = new THREE.ShaderMaterial({
  transparent: true,
  blending:    THREE.AdditiveBlending,
  depthWrite:  false,
  depthTest:   false,
  uniforms: {
    uTime:  { value: 0 },
    uColor: { value: hexToVec3(atmoColor) },
    uRes:   { value: new THREE.Vector2(window.innerWidth*window.devicePixelRatio, window.innerHeight*window.devicePixelRatio) },
  },
  vertexShader:`
    attribute float size;attribute float seed;uniform float uTime;uniform vec2 uRes;
    varying float vA;
    vec3 warp(vec3 p,float t){float c=0.9,a=1.9,b=0.02,s=0.05;p*=2.;
      p.x+=c*sin(s*t+a*p.y)+t*b;p.y+=c*cos(s*t+a*p.x);p.y+=c*sin(s*t+a*p.z)+t*b;
      p.z+=c*cos(s*t+a*p.y);p.z+=c*sin(s*t+a*p.x)+t*b;p.x+=c*cos(s*t+a*p.z);
      return cos(p+vec3(1,2,4));}
    void main(){
      vec3 v=position*4.0+warp(position,uTime)*1.2;
      vec4 mv=modelViewMatrix*vec4(v,1.0);
      float r=length(v);float farF=1.0-smoothstep(5.0,6.5,r);float nearF=smoothstep(0.0,0.5,-mv.z);
      vA=farF*nearF;
      gl_PointSize=size*uRes.y/900.0/-mv.z;gl_PointSize=max(gl_PointSize,1.0);
      gl_Position=projectionMatrix*mv;
    }
  `,
  fragmentShader:`
    uniform vec3 uColor;varying float vA;
    void main(){vec2 p=gl_PointCoord-0.5;float l=length(p);if(l>0.5)discard;
      float tex=smoothstep(0.5,0.0,l);gl_FragColor=vec4(uColor*tex,tex*vA*0.6);}
  `,
});

const atmoPoints = new THREE.Points(atmoGeo, atmoMat);
atmoPoints.frustumCulled = false;
atmoPoints.layers.enable(LAYERS.ENTIRE_SCENE);
scene.add(atmoPoints);

/* ── FinalPass ────────────────────────────────────────────────────────── */
const FinalShader = {
  uniforms: {
    iTime:        { value: 0 },
    tDiffuse:     { value: null },
    torusTexture: { value: null },
    bloomTexture: { value: null },
    haloTexture:  { value: null },
    uBg:          { value: hexToVec3(bgColor) },
    uFlameA:      { value: hexToVec3(flameColor) },
    uFlameB:      { value: hexToVec3(flameColor2) },
    uFlameAmt:    { value: flameAmt },
  },
  vertexShader:  `varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}`,
  fragmentShader:`
    uniform float iTime;uniform sampler2D tDiffuse;uniform sampler2D bloomTexture;
    uniform sampler2D torusTexture;uniform sampler2D haloTexture;
    uniform vec3 uBg;uniform vec3 uFlameA;uniform vec3 uFlameB;uniform float uFlameAmt;
    varying vec2 vUv;
    vec3 warp3d(vec3 pos,float t){float curv=.8,a=1.9,b=0.7;pos*=2.;
      pos.x+=curv*sin(t+a*pos.y)+t*b;pos.y+=curv*cos(t+a*pos.x);
      pos.y+=curv*sin(t+a*pos.z)+t*b;pos.z+=curv*cos(t+a*pos.y);
      pos.z+=curv*sin(t+a*pos.x)+t*b;pos.x+=curv*cos(t+a*pos.z);
      return 0.5+0.5*cos(pos.xyz+vec3(1,2,4));}
    void main(){
      vec2 uv=2.*vUv-1.;
      vec3 w=pow(warp3d(vec3(uv.x,sin(uv.y),uv.y),iTime*1.5),vec3(1.5));
      vec3 flame=1.5*uFlameA*w.x;flame*=w.y;flame+=uFlameB*w.z;
      flame*=smoothstep(0.25,1.,abs(uv.y));
      float md=smoothstep(-0.7,1.,-uv.y*uv.x);flame*=md*md;
      vec3 bg=uBg*(1.0-0.4*length(uv));
      vec3 halo=texture2D(haloTexture,vUv).xyz;
      gl_FragColor=vec4(bg+flame*uFlameAmt+texture2D(bloomTexture,vUv).xyz+texture2D(torusTexture,vUv).xyz+texture2D(tDiffuse,vUv).xyz+halo,1.);
    }
  `,
};

/* ── Three composers ──────────────────────────────────────────────────── */
const renderScene = new RenderPass(scene, camera);

// torusComposer
const torusComposer = new EffectComposer(renderer);
torusComposer.renderToScreen = false;
torusComposer.addPass(renderScene);
torusComposer.addPass(new ShaderPass(GammaCorrectionShader));
torusComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.22, 0.2, 0));
torusComposer.addPass(new ShaderPass(CopyShader));

// bloomComposer
const bloomComposer = new EffectComposer(renderer);
bloomComposer.renderToScreen = false;
bloomComposer.addPass(renderScene);
bloomComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.6, 0));
bloomComposer.addPass(new ShaderPass(GammaCorrectionShader));

// blank texture for halo
const blankRT = new THREE.WebGLRenderTarget(1, 1);

// finalComposer
const finalPass = new ShaderPass(FinalShader);
finalPass.uniforms.bloomTexture.value = bloomComposer.renderTarget1.texture;
finalPass.uniforms.torusTexture.value = torusComposer.renderTarget1.texture;
finalPass.uniforms.haloTexture.value  = blankRT.texture;

const finalComposer = new EffectComposer(renderer);
finalComposer.addPass(renderScene);
finalComposer.addPass(finalPass);

/* ── Scroll state ─────────────────────────────────────────────────────── */
let scrollTarget=0, scrollSmooth=0, scrollCurrent=0;
window.addEventListener('scroll', ()=>{
  const maxScroll = document.body.scrollHeight - window.innerHeight;
  scrollTarget = clamp(window.scrollY / maxScroll, 0, 1);
});

/* ── Pointer state ────────────────────────────────────────────────────── */
const mouseTarget = { x:0, y:0 };
const mouse       = { x:0, y:0 };
const POINTER     = { world: new THREE.Vector3(), activity:0, active:false, lastMove:0 };
const _raycaster  = new THREE.Raycaster();
const _ndc        = new THREE.Vector2();
const _worldTmp   = new THREE.Vector3();

window.addEventListener('mousemove', e=>{
  mouseTarget.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouseTarget.y = -((e.clientY / window.innerHeight) * 2 - 1);
  POINTER.active   = true;
  POINTER.lastMove = performance.now();
});
window.addEventListener('mouseout', ()=>{ POINTER.active = false; });

/* ── Animation ────────────────────────────────────────────────────────── */
let firstFrame = null, lastTime = null, spinPhase = 0;

function animate(now){
  requestAnimationFrame(animate);

  if(firstFrame===null) firstFrame = now;
  const dt      = lastTime!==null ? clamp((now-lastTime)/1000, 0, 0.05) : 0;
  lastTime      = now;
  const elapsed = (now - firstFrame) / 1000;
  const t       = now / 1000;

  // Scroll (double-damped)
  scrollSmooth  = Lerp(scrollSmooth,  scrollTarget,  0.10);
  scrollCurrent = Lerp(scrollCurrent, scrollSmooth,  0.06);

  // Mouse
  mouse.x = Lerp(mouse.x, mouseTarget.x, 0.06);
  mouse.y = Lerp(mouse.y, mouseTarget.y, 0.06);

  // Cursor activity & world pos
  const idle = (now - POINTER.lastMove) / 1000;
  POINTER.activity = Lerp(POINTER.activity, POINTER.active && idle < 3 ? 1 : 0, 0.06);
  _ndc.set(mouse.x, mouse.y);
  _raycaster.setFromCamera(_ndc, camera);
  const { origin:org, direction:dir } = _raycaster.ray;
  if(Math.abs(dir.z) > 0.0001){
    const t2 = -org.z / dir.z;
    _worldTmp.set(org.x + dir.x*t2, org.y + dir.y*t2, 0);
    POINTER.world.lerp(_worldTmp, 0.12);
  }

  // Camera
  camera.position.set(mouse.x*parallax, mouse.y*parallax, 8.67 - scrollCurrent*scrollDolly);
  camera.lookAt(0, 0, 0);

  // Group
  group.position.y  = -scrollCurrent * scrollClimb;
  spinPhase        += dt * (spin + scrollCurrent * scrollSpin);
  group.rotation.y  = spinPhase;

  // Helix uniforms
  helixMat.uniforms.uTime.value     = t;
  helixMat.uniforms.uAppear.value   = clamp((elapsed - 0.2) / 1.4, 0, 1);
  helixMat.uniforms.uTwist.value    = twist * (1 + scrollCurrent * scrollTwist);
  helixMat.uniforms.uCursor.value.copy(POINTER.world);
  helixMat.uniforms.uActivity.value = POINTER.activity;

  // Atmo follows camera
  atmoPoints.position.copy(camera.position);
  atmoMat.uniforms.uTime.value = t * atmoSpeed * 8.0;

  finalPass.uniforms.iTime.value = t;

  // Render order
  camera.layers.set(LAYERS.TORUS_SCENE);
  torusComposer.render();

  camera.layers.set(LAYERS.BLOOM_SCENE);
  bloomComposer.render();

  camera.layers.set(LAYERS.ENTIRE_SCENE);
  finalComposer.render();
}

/* ── Resize ───────────────────────────────────────────────────────────── */
window.addEventListener('resize', ()=>{
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  [torusComposer, bloomComposer, finalComposer].forEach(c=>{
    c.setPixelRatio(window.devicePixelRatio);
    c.setSize(w, h);
  });
  atmoMat.uniforms.uRes.value.set(w*window.devicePixelRatio, h*window.devicePixelRatio);
});

requestAnimationFrame(animate);
</script>
</body>
</html>
