<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision-Bento — Section</title>

<!-- Geist (variable, 100..900 — required for the off-grid weights) + Inter fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap">
<!-- Phosphor icons (regular) -->
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">

<style>
  /* ============================================================ DESIGN TOKENS */
  :root {
    /* layout */
    --max-width: 1820px;
    --section-pad: clamp(34px, 4vw, 72px) clamp(16px, 3.8vw, 72px);
    --grid-gap: clamp(14px, 1.25vw, 22px);
    --card-pad: 24px;

    /* color */
    --canvas: #f7f8f8;
    --ink: #111111;
    --text: #677070;
    --label: #758080;
    --meta: #6b7676;
    --quote: #263030;
    --card-neutral: #dce3e3;
    --mint-base: #edf2f2;

    /* lines / glass */
    --hairline: rgb(17 17 17 / 0.1);
    --card-line: rgb(18 35 35 / 0.09);
    --glass-line: rgb(255 255 255 / 0.2);
    --glass-fill: rgb(255 255 255 / 0.18);

    /* gradients */
    --mint-card: linear-gradient(135deg, rgb(255 255 255 / 0.72), rgb(238 244 244 / 0.86)), #edf2f2;
    --shade: linear-gradient(180deg, rgb(5 12 14 / 0.3), transparent 34%), linear-gradient(0deg, rgb(5 12 14 / 0.78), transparent 48%);
    --shade-soft: linear-gradient(180deg, rgb(5 12 14 / 0.18), transparent 34%), linear-gradient(0deg, rgb(5 12 14 / 0.32), transparent 56%);

    /* radius */
    --r-card: 18px;
    --r-pill: 14px;
    --r-button: 999px;
    --r-circle: 50%;

    /* shadow */
    --shadow-card: 0 22px 60px rgb(21 34 34 / 0.08);
    --shadow-button: inset 0 1px 0 rgb(255 255 255 / 0.95), 0 18px 44px rgb(31 44 44 / 0.08);
    --shadow-glass: inset 0 1px 0 rgb(255 255 255 / 0.24);
  }

  /* ============================================================ RESET / BASE */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--canvas);
    color: var(--ink);
    font-family: "Geist", "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  /* ============================================================ SECTION SHELL */
  .section { position: relative; min-height: 100vh; padding: var(--section-pad); }
  .section__wrap { max-width: var(--max-width); margin: 0 auto; }

  /*
    Drop components from references/components.md below this line:
    header (§2), CTA pill / icon button (§3), bento grid (§4),
    media card (§5), eyebrow (§6), timeline (§7), metric (§8),
    quote (§9), contact (§10), marquee (§11), responsive (§12).
    Marquee keyframes + reduced-motion guard are pre-wired below.
  */

  /* ============================================================ MOTION KEYFRAMES */
  @keyframes marquee-left  { from { transform: translateX(0); }    to { transform: translateX(-50%); } }
  @keyframes marquee-right { from { transform: translateX(-50%); } to { transform: translateX(0); } }

  @media (prefers-reduced-motion: reduce) {
    .marquee__row { animation: none; }
  }
</style>
</head>

<body>
  <section class="section">
    <div class="section__wrap">
      <!-- Build the section here. Keep one media card and one light/glass card for contrast. -->
    </div>
  </section>
</body>
</html>
