<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

/* ============================= ICONS (Lucide) ============================= */
const Icon = ({ name, className="", size=16, strokeWidth=1.75 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide && ref.current) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", name);
      el.setAttribute("stroke-width", strokeWidth);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs:{ width:size, height:size }});
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={"inline-flex items-center justify-center "+className} style={{width:size, height:size}} />;
};

/* ============================ FORMATTERS ============================ */
const fmtUSD = (v, max=2) => isFinite(v) ? v.toLocaleString("en-US",{minimumFractionDigits:2, maximumFractionDigits:max}) : "—";
const fmtIDR = (v) => isFinite(v) ? Math.round(v).toLocaleString("id-ID") : "—";
const fmtPct = (v, dp=2) => isFinite(v) ? (v*100).toFixed(dp)+"%" : "—";
const round2 = (n) => Math.round(n*100)/100;

/* ============================ HPM ENGINE ============================ */
function computeHPM({ Ni, Fe, Co, Cr, MC, HMA_Ni, HMA_Fe, HMA_Co, HMA_Cr, FX, MgmtFee }) {
  const CF_Ni = 0.30 + ((Ni - 1.60) * 0.10);            // Spec: per 0.1% deviation -> 1% (=0.01) change
  const CF_Fe = Fe <= 35 ? 0.30 : 0.30 - ((Fe - 35) * 0.01);
  const CF_Co = Co >= 0.05 ? 0.30 : 0;
  const CF_Cr = 0.10;

  const Value_Ni = Ni * CF_Ni * HMA_Ni;
  const Value_Fe = Fe * CF_Fe * HMA_Fe * 100;
  const Value_Co = Co * CF_Co * HMA_Co * 100;
  const Value_Cr = Cr * CF_Cr * HMA_Cr * 100;

  const HPM_DMT = Value_Ni + Value_Fe + Value_Co + Value_Cr;
  const HPM_WMT = HPM_DMT * (1 - MC/100);
  const FOB_USD = HPM_WMT - MgmtFee;
  const FOB_IDR = FOB_USD * FX;
  const HPM_WMT_IDR = HPM_WMT * FX;

  return { CF_Ni, CF_Fe, CF_Co, CF_Cr, Value_Ni, Value_Fe, Value_Co, Value_Cr, HPM_DMT, HPM_WMT, FOB_USD, FOB_IDR, HPM_WMT_IDR };
}

const DEFAULT_STATE = {
  Ni: 1.60, Fe: 25.00, Co: 0.06, Cr: 0.80, MC: 35.00,
  HMA_Ni: 17500.00, HMA_Fe: 1.50, HMA_Co: 28000.00, HMA_Cr: 6.00,
  FX: 16100.00, MgmtFee: 2.00,
};

const PRESETS = [
  { id:"highGrade", name:"High-Grade Saprolite", tag:"Ni-Rich · Premium", color:"emerald", icon:"mountain",
    values:{ Ni:1.9, Fe:15, Co:0.02, Cr:1.2, MC:33 } },

];

/* ============================ ATOMS ============================ */
const Slider = ({ value, min, max, step, onChange }) => {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <input
      type="range" className="nd-range"
      value={value} min={min} max={max} step={step}
      onChange={(e) => onChange(parseFloat(e.target.value))}
      style={{ "--pct": pct + "%" }}
    />
  );
};

const NumberControl = ({ label, hint, unit, min, max, step, value, onChange, dp=2, accent="emerald", chip }) => {
  const clamp = (v) => Math.min(max, Math.max(min, v));
  const handleNum = (e) => {
    const v = parseFloat(e.target.value);
    if (!isNaN(v)) onChange(clamp(v));
  };
  return (
    <div className="group">
      <div className="flex items-end justify-between gap-3 mb-2">
        <div className="min-w-0">
          <div className="flex items-center gap-2">
            <span className="text-[11px] uppercase tracking-[0.14em] text-slate-400 font-semibold">{label}</span>
            {chip}
          </div>
          {hint && <div className="text-[10.5px] text-slate-500 mt-0.5 truncate">{hint}</div>}
        </div>
        <div className="flex items-center gap-1.5 shrink-0">
          <input
            type="number" min={min} max={max} step={step}
            value={Number(value).toFixed(dp)}
            onChange={handleNum}
            className="nd-num"
          />
          <span className="text-[10px] text-slate-500 font-medium w-6">{unit}</span>
        </div>
      </div>
      <Slider value={value} min={min} max={max} step={step} onChange={onChange} />
      <div className="flex justify-between text-[9.5px] text-slate-500 mono mt-1">
        <span>{Number(min).toFixed(dp)}</span>
        <span className="text-emerald-300/80">{Number(value).toFixed(dp)} {unit}</span>
        <span>{Number(max).toFixed(dp)}</span>
      </div>
    </div>
  );
};

/* ============================ SENSITIVITY MATRIX ============================ */
const SensitivityMatrix = ({ state, unitMode }) => {
  const niAxis = [1.4, 1.5, 1.6, 1.7, 1.8];
  const mcAxis = [30, 32, 34, 36, 38];
  const cellNi = niAxis.reduce((acc,v) => Math.abs(v-state.Ni) < Math.abs(acc-state.Ni) ? v : acc, niAxis[0]);
  const cellMc = mcAxis.reduce((acc,v) => Math.abs(v-state.MC) < Math.abs(acc-state.MC) ? v : acc, mcAxis[0]);
  const useIDR = unitMode === "IDR";

  const cells = niAxis.map((ni) => mcAxis.map((mc) => {
    const res = computeHPM({ ...state, Ni:ni, MC:mc });
    return useIDR ? res.FOB_IDR : res.FOB_USD;
  }));
  const flat = cells.flat();
  const min = Math.min(...flat), max = Math.max(...flat);

  const color = (v) => {
    const t = (v - min) / Math.max(1e-9, (max - min));
    const hue = 160; // emerald hue
    const lit = 18 + t*38;
    const sat = 35 + t*40;
    return `hsl(${hue}, ${sat}%, ${lit}%)`;
  };

  return (
    <div className="overflow-x-auto">
      <table className="w-full text-[11px] mono border-separate border-spacing-0">
        <thead>
          <tr>
            <th className="text-left text-[10px] uppercase tracking-wider text-slate-500 font-semibold pb-2 pr-2">Ni \ MC</th>
            {mcAxis.map((mc) => (
              <th key={mc} className="text-center text-[10px] uppercase tracking-wider text-slate-500 font-semibold pb-2 px-1">
                {mc}%
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {niAxis.map((ni, i) => (
            <tr key={ni}>
              <td className="text-[10px] uppercase tracking-wider text-slate-400 font-semibold py-1.5 pr-2 mono">{ni.toFixed(1)}%</td>
              {mcAxis.map((mc, j) => {
                const v = cells[i][j];
                const active = ni === cellNi && mc === cellMc;
                return (
                  <td key={mc} className="p-1">
                    <div className={"rounded-lg px-2 py-2.5 text-center transition-all "
                      + (active
                        ? "border-2 border-emerald-400 animate-pulseGlow text-emerald-100 font-bold"
                        : "border border-white/5 text-slate-300 hover:border-white/15")}
                      style={{ background: active ? "linear-gradient(180deg, rgba(16,185,129,0.25), rgba(2,6,15,0.6))" : color(v) }}>
                      <div className="text-[11px]">{useIDR ? Math.round(v).toLocaleString("id-ID") : v.toFixed(0)}</div>
                      {active && <div className="text-[8px] uppercase tracking-widest text-emerald-300 mt-0.5">Current</div>}
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
      <div className="flex items-center gap-3 mt-3 text-[10px] text-slate-500">
        <span>Low</span>
        <div className="flex-1 h-2 rounded-full" style={{ background:"linear-gradient(90deg, hsl(160,35%,18%), hsl(160,75%,56%))" }}/>
        <span>High</span>
        <span className="ml-3 text-slate-400">Unit: {useIDR ? "Rp /wmt" : "USD /wmt"}</span>
      </div>
    </div>
  );
};

        <span className="text-slate-400"><Icon name={open ? "chevron-up" : "chevron-down"} size={16}/></span>
      </button>

      <div className={"overflow-hidden transition-all "+(open ? "max-h-[1400px] opacity-100":"max-h-0 opacity-0")}>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-[11px] mt-4">
          <div className="glass rounded-xl p-3 border border-white/5">
            <div className="text-[9.5px] uppercase tracking-wider text-slate-500 font-semibold mb-2">Ticket Meta</div>
            <Row k="Ticket ID" v={ticketId}/>
            <Row k="Generated" v={now.toLocaleString("en-GB",{ dateStyle:"medium", timeStyle:"short" })+" WIB"}/>
            <Row k="Currency" v={useIDR ? "IDR (Rupiah)" : "USD (Dollar)"}/>
            <Row k="Basis" v="WMT · Moisture-Adjusted FOB"/>
          </div>
          <div className="glass rounded-xl p-3 border border-white/5">
            <div className="text-[9.5px] uppercase tracking-wider text-slate-500 font-semibold mb-2">Cargo Specification</div>
            <Row k="Ni Grade" v={state.Ni.toFixed(2)+"%"}/>
            <Row k="Fe Content" v={state.Fe.toFixed(2)+"%"}/>
            <Row k="Co Content" v={state.Co.toFixed(3)+"%"}/>
            <Row k="Cr Content" v={state.Cr.toFixed(2)+"%"}/>
            <Row k="Moisture" v={state.MC.toFixed(2)+"%"}/>
          </div>
          <div className="glass rounded-xl p-3 border border-white/5">
            <div className="text-[9.5px] uppercase tracking-wider text-slate-500 font-semibold mb-2">Reference Pricing</div>
            <Row k="HMA Ni" v={"$"+fmtUSD(state.HMA_Ni)}/>
            <Row k="HMA Fe" v={"$"+fmtUSD(state.HMA_Fe)}/>
            <Row k="HMA Co" v={"$"+fmtUSD(state.HMA_Co)}/>
            <Row k="HMA Cr" v={"$"+fmtUSD(state.HMA_Cr)}/>
            <Row k="FX USD/IDR" v={"Rp "+fmtIDR(state.FX)}/>
          </div>
          <div className="glass rounded-xl p-3 border border-emerald-400/20 md:col-span-2 bg-emerald-500/5">
            <div className="text-[9.5px] uppercase tracking-wider text-emerald-300/80 font-semibold mb-2">Pricing Breakdown</div>
            <Row k="Value · Ni"      v={"$"+fmtUSD(r.Value_Ni)+"  ·  CF "+fmtPct(r.CF_Ni,1)}/>
            <Row k="Value · Fe"      v={"$"+fmtUSD(r.Value_Fe)+"  ·  CF "+fmtPct(r.CF_Fe,1)}/>
            <Row k="Value · Co"      v={"$"+fmtUSD(r.Value_Co)+"  ·  CF "+fmtPct(r.CF_Co,1)}/>
            <Row k="Value · Cr"      v={"$"+fmtUSD(r.Value_Cr)+"  ·  CF "+fmtPct(r.CF_Cr,1)}/>
            <Row k="HPM (DMT)"       v={"$"+fmtUSD(r.HPM_DMT)+" /dmt"}/>
            <Row k="HPM (WMT)"       v={(useIDR ? "Rp "+fmtIDR(r.HPM_WMT_IDR) : "$"+fmtUSD(r.HPM_WMT))+" /wmt"}/>
            <Row k="Management Fee"  v={"– $"+fmtUSD(state.MgmtFee)+" /wmt"}/>
            <Row k="NET FOB SELLER"  v={(useIDR ? "Rp "+fmtIDR(r.FOB_IDR) : "$"+fmtUSD(r.FOB_USD))+" /wmt"} em/>
          </div>
          <div className="glass rounded-xl p-3 border border-white/5">
            <div className="text-[9.5px] uppercase tracking-wider text-slate-500 font-semibold mb-2">Formulas Applied</div>
            <ul className="text-[10.5px] mono text-slate-400 space-y-1 leading-relaxed">
              <li>CF<sub>Ni</sub> = 0.30 + (Ni − 1.60) × 0.10</li>
              <li>CF<sub>Fe</sub> = Fe ≤ 35 ? 0.30 : 0.30 − (Fe−35) × 0.01</li>
              <li>CF<sub>Co</sub> = Co ≥ 0.05 ? 0.30 : 0</li>
              <li>CF<sub>Cr</sub> = 0.10</li>
              <li>V<sub>el</sub> = grade × CF × HMA × (Ni:1, others:100)</li>
              <li>HPM<sub>WMT</sub> = HPM<sub>DMT</sub> × (1 − MC/100)</li>
            </ul>
          </div>
        </div>

        <div className="mt-4 text-[9.5px] text-slate-500 leading-relaxed border-t border-white/5 pt-3">
          <span className="text-slate-400 font-semibold uppercase tracking-wider">Disclosure ·</span> Indicative pricing only. Generated by NICKELDESK against the ESDM HPM framework (Permen ESDM No. 11/2020, as revised). HMA references are user-adjustable. This deal sheet is not a binding offer and does not constitute investment, commercial, or regulatory advice. All variables are point-in-time inputs subject to verification by independent surveyor and counterparty due diligence.
        </div>
      </div>
    </div>
  );
};

const Row = ({ k, v, em }) => (
  <div className={"flex items-center justify-between py-1 border-b border-white/5 last:border-0 "+(em ? "mt-1 pt-2 border-t border-emerald-400/30" : "")}>
    <span className="text-slate-500">{k}</span>
    <span className={"mono "+(em ? "text-emerald-200 font-bold text-[12px]" : "text-slate-200 font-semibold")}>{v}</span>
  </div>
);

/* ============================ PRINT VIEW ============================ */

  const now = new Date();
  const useIDR = unitMode === "IDR";
  return (
    <div className="print-only" style={{ padding:"24px", color:"#0b0f17", background:"#fff" }}>
      <div style={{ display:"flex", justifyContent:"space-between", borderBottom:"2px solid #064e3b", paddingBottom:12, marginBottom:18 }}>
        <div>
          <div style={{ fontSize:22, fontWeight:800, color:"#064e3b" }}>NICKELDESK · HPM Deal Sheet</div>
          <div style={{ fontSize:11, color:"#1f2937" }}>Indonesian Nickel Ore Pricing · ESDM Framework</div>
        </div>
        <div style={{ textAlign:"right", fontSize:11, color:"#1f2937" }}>
          <div>{now.toLocaleString("en-GB",{ dateStyle:"long", timeStyle:"short" })} WIB</div>
          <div>Ticket · NDX-DS-{now.getFullYear().toString().slice(2)}{(now.getMonth()+1).toString().padStart(2,"0")}{now.getDate().toString().padStart(2,"0")}-{Math.floor(Math.random()*9000+1000)}</div>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14, fontSize:11 }}>
        <div>
          <div style={{ fontWeight:700, color:"#065f46", marginBottom:6 }}>CARGO SPECIFICATION</div>
          <div>Ni Grade: <b>{state.Ni.toFixed(2)}%</b></div>
          <div>Fe Content: <b>{state.Fe.toFixed(2)}%</b></div>
          <div>Co Content: <b>{state.Co.toFixed(3)}%</b></div>
          <div>Cr Content: <b>{state.Cr.toFixed(2)}%</b></div>
          <div>Moisture: <b>{state.MC.toFixed(2)}%</b></div>
        </div>
        <div>
          <div style={{ fontWeight:700, color:"#065f46", marginBottom:6 }}>HMA REFERENCE (USD/dmt)</div>
          <div>Ni: <b>${fmtUSD(state.HMA_Ni)}</b></div>
          <div>Fe: <b>${fmtUSD(state.HMA_Fe)}</b></div>
          <div>Co: <b>${fmtUSD(state.HMA_Co)}</b></div>
          <div>Cr: <b>${fmtUSD(state.HMA_Cr)}</b></div>
          <div>FX (USD→IDR): <b>{fmtIDR(state.FX)}</b></div>
        </div>
        <div>
          <div style={{ fontWeight:700, color:"#065f46", marginBottom:6 }}>VALUATION BREAKDOWN</div>
          <div>V<sub>Ni</sub>: <b>${fmtUSD(r.Value_Ni)}</b> (CF {fmtPct(r.CF_Ni,1)})</div>
          <div>V<sub>Fe</sub>: <b>${fmtUSD(r.Value_Fe)}</b> (CF {fmtPct(r.CF_Fe,1)})</div>
          <div>V<sub>Co</sub>: <b>${fmtUSD(r.Value_Co)}</b> (CF {fmtPct(r.CF_Co,1)})</div>
          <div>V<sub>Cr</sub>: <b>${fmtUSD(r.Value_Cr)}</b> (CF {fmtPct(r.CF_Cr,1)})</div>
        </div>
      </div>
      <div style={{ marginTop:18, padding:14, border:"2px solid #064e3b", borderRadius:8, background:"#ecfdf5" }}>
        <div style={{ fontSize:11, color:"#065f46", fontWeight:700, marginBottom:8 }}>FINAL PRICING (Moisture-Adjusted)</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, fontSize:12 }}>
          <div>HPM DMT: <b>${fmtUSD(r.HPM_DMT)}</b> /dmt</div>
          <div>HPM WMT: <b>{useIDR ? "Rp "+fmtIDR(r.HPM_WMT_IDR) : "$"+fmtUSD(r.HPM_WMT)}</b> /wmt</div>
          <div>NET FOB: <b style={{ color:"#064e3b" }}>{useIDR ? "Rp "+fmtIDR(r.FOB_IDR) : "$"+fmtUSD(r.FOB_USD)}</b> /wmt</div>
        </div>
      </div>
      <div style={{ marginTop:14, fontSize:10, color:"#374151", lineHeight:1.55 }}>
        <b>Formulas:</b> CF<sub>Ni</sub>=0.30+(Ni−1.60)·0.10; CF<sub>Fe</sub>=Fe≤35?0.30:0.30−(Fe−35)·0.01; CF<sub>Co</sub>=Co≥0.05?0.30:0; CF<sub>Cr</sub>=0.10. V<sub>Ni</sub>=Ni·CF·HMA; V<sub>Fe/Co/Cr</sub>=grade·CF·HMA·100. HPM<sub>WMT</sub>=HPM<sub>DMT</sub>·(1−MC/100). FOB<sub>net</sub>=HPM<sub>WMT</sub>−Fee.

};

/* ============================ APP ============================ */
function App() {
  const [state, setState] = useState(DEFAULT_STATE);
  const [unitMode, setUnitMode] = useState("USD");
  const [activePreset, setActivePreset] = useState(null);

  const r = useMemo(() => computeHPM(state), [state]);

  const useIDR = unitMode === "IDR";
  const baseline = useIDR ? r.FOB_IDR : r.FOB_USD;

  const onReset = () => { setState(DEFAULT_STATE); setActivePreset(null); };
  const onExport = () => window.print();

  // Dynamic warnings
  const warnings = [];
  if (state.Co < 0.05) warnings.push({ tone:"warn", icon:"alert-triangle", title:"Cobalt Sub-Threshold", text:`Co at ${state.Co.toFixed(3)}% < 0.05% premium gate — Value_Co disqualified to zero.` });
  if (state.Fe > 35)   warnings.push({ tone:"danger", icon:"flame", title:"Iron Penalty Active",   text:`Fe at ${state.Fe.toFixed(2)}% > 35% — CF_Fe linearly degraded to ${fmtPct(r.CF_Fe,1)}.` });
  if (state.Ni < 1.4)  warnings.push({ tone:"warn", icon:"trending-down", title:"Low Nickel Grade", text:`Ni at ${state.Ni.toFixed(2)}% triggers reduced correction factor (${fmtPct(r.CF_Ni,1)}).` });
  if (state.MC > 40)   warnings.push({ tone:"warn", icon:"droplets", title:"High Moisture",        text:`MC at ${state.MC.toFixed(1)}% slashes WMT yield by ${fmtPct(state.MC/100,1)}.` });

  return (
    <div className="min-h-screen">
      <Header unitMode={unitMode} setUnitMode={setUnitMode} onReset={onReset} onExport={onExport}/>

      <main className="px-4 lg:px-8 py-5 lg:py-7 grid grid-cols-12 gap-5 lg:gap-6 no-print">
        {/* SIDEBAR */}
        <div className="col-span-12 xl:col-span-4 2xl:col-span-3">
          <div className="xl:sticky xl:top-[124px]">
            <Sidebar state={state} setState={setState} activePreset={activePreset} setActivePreset={setActivePreset}/>
          </div>
        </div>

        {/* MAIN VIEWPORT */}
        <div className="col-span-12 xl:col-span-8 2xl:col-span-9 space-y-5 lg:space-y-6">
          {/* HERO */}
          <HeroMetric r={r} state={state} unitMode={unitMode}/>

          {/* WARNINGS */}
          {warnings.length > 0 && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {warnings.map((w,i)=>(
                <div key={i} className={"glass rounded-2xl p-3.5 border flex items-start gap-3 animate-riseIn "
                  + (w.tone==="danger" ? "border-rose-400/30 shadow-[0_0_24px_-12px_rgba(244,63,94,0.55)]" : "border-amber-400/30 shadow-[0_0_24px_-12px_rgba(245,158,11,0.55)]")}>
                  <div className={"w-9 h-9 rounded-xl grid place-items-center shrink-0 "
                    + (w.tone==="danger" ? "bg-rose-500/15 text-rose-300" : "bg-amber-500/15 text-amber-300")}>
                    <Icon name={w.icon} size={16}/>
                  </div>
                  <div className="min-w-0">
                    <div className={"text-[11.5px] font-bold uppercase tracking-wider "
                      + (w.tone==="danger" ? "text-rose-200" : "text-amber-200")}>{w.title}</div>
                    <div className="text-[11.5px] text-slate-300 leading-snug mt-0.5">{w.text}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ELEMENT VALUATION GRID */}
          <div>
            <div className="flex items-end justify-between mb-3">
              <div>
                <div className="text-[10px] uppercase tracking-[0.22em] text-emerald-300/80 font-semibold">Elemental Breakdown</div>
                <div className="display font-bold text-[18px]">Value Contribution per Element</div>
              </div>
              <span className="chip mono"><Icon name="atom" size={11}/> 4 of 4 elements priced</span>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
              <ElementCard symbol="Ni" name="Nickel"  color="emerald" grade={state.Ni} cf={r.CF_Ni} hma={state.HMA_Ni} value={r.Value_Ni} totalDmt={r.HPM_DMT}
                badge={state.Ni>=1.7 ? <span className="chip chip-em !text-[9px] !py-0.5">PREMIUM</span> : null}/>
              <ElementCard symbol="Fe" name="Iron"    color="rose"    grade={state.Fe} cf={r.CF_Fe} hma={state.HMA_Fe} value={r.Value_Fe} totalDmt={r.HPM_DMT}
                badge={state.Fe>35 ? <span className="chip chip-danger !text-[9px] !py-0.5">PENALTY</span> : null}/>
              <ElementCard symbol="Co" name="Cobalt"  color="amber"   grade={state.Co} cf={r.CF_Co} hma={state.HMA_Co} value={r.Value_Co} totalDmt={r.HPM_DMT}
                badge={state.Co<0.05 ? <span className="chip chip-warn !text-[9px] !py-0.5">SUB-THRESHOLD</span> : <span className="chip chip-em !text-[9px] !py-0.5">PREMIUM</span>}/>
              <ElementCard symbol="Cr" name="Chromium" color="violet" grade={state.Cr} cf={r.CF_Cr} hma={state.HMA_Cr} value={r.Value_Cr} totalDmt={r.HPM_DMT}
                badge={<span className="chip !text-[9px] !py-0.5">FIXED CF</span>}/>
            </div>
          </div>

          {/* ANALYTICS GRID */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 lg:gap-6">
            {/* DONUT */}
            <div className="glass rounded-3xl p-5 lg:p-6 neon-border">
              <div className="flex items-end justify-between mb-3">
                <div>
                  <div className="text-[10px] uppercase tracking-[0.22em] text-emerald-300/80 font-semibold">Composition Analytics</div>
                  <div className="display font-bold text-[18px]">Value Contribution Donut</div>
                </div>
                <span className="chip mono"><Icon name="pie-chart" size={11}/> DMT BASIS</span>
              </div>
              <Donut r={r}/>
            </div>

            {/* STRESS */}
            <div className="glass rounded-3xl p-5 lg:p-6 neon-border">
              <div className="flex items-end justify-between mb-3">
                <div>
                  <div className="text-[10px] uppercase tracking-[0.22em] text-emerald-300/80 font-semibold">Macro Stress Test</div>
                  <div className="display font-bold text-[18px]">±30% Market Shock Scenarios</div>
                </div>
                <span className="chip mono"><Icon name="activity" size={11}/> {useIDR ? "IDR" : "USD"} /WMT</span>
              </div>
              <StressChart baseline={baseline} useIDR={useIDR}/>
              <div className="text-[10.5px] text-slate-500 mt-2 leading-relaxed">
                Scenarios apply a uniform proportional shift to the calculated FOB seller price. Useful for hedging committee and term-sheet sensitivity windows.
              </div>
            </div>
          </div>

          {/* SENSITIVITY MATRIX */}
          <div className="glass rounded-3xl p-5 lg:p-6 neon-border">
            <div className="flex flex-wrap items-end justify-between gap-2 mb-4">
              <div>
                <div className="text-[10px] uppercase tracking-[0.22em] text-emerald-300/80 font-semibold">5×5 Stress Matrix</div>
                <div className="display font-bold text-[18px]">Sensitivity · Ni Grade × Moisture</div>
                <div className="text-[11.5px] text-slate-500 mt-0.5 text-balance">Cross-grid intersections show FOB price across 25 nearest-neighbour scenarios. Active cell pulses with neon ring.</div>
              </div>
              <div className="flex gap-2">
                <span className="chip mono"><Icon name="grid-3x3" size={11}/> 25 SCENARIOS</span>
                <span className="chip chip-em mono">CURRENT · Ni {state.Ni.toFixed(2)}% / MC {state.MC.toFixed(1)}%</span>
              </div>
            </div>
            <SensitivityMatrix state={state} unitMode={unitMode}/>
          </div>

          {/* DEAL SHEET */}
          <DealSheet state={state} r={r} unitMode={unitMode}/>

          {/* FOOTER */}
          <div className="text-center pb-6">
            <div className="text-[10px] text-slate-500 tracking-[0.22em] uppercase">NICKELDESK · Engineered for Indonesian Nickel Commerce</div>
            <div className="text-[10px] text-slate-600 mt-1 mono">© {new Date().getFullYear()} · ESDM Framework Calculator · v2.6 · Real-time</div>
          </div>
        </div>
      </main>

      <PrintView state={state} r={r} unitMode={unitMode}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
